#  =============================================================================
# defaults.conf — ldown base configuration
# part of ldown — deterministic self-healing WireGuard mesh orchestrator
# =============================================================================
#
# this file is sourced automatically by bin/ldown at startup
# values here are the lowest-priority fallbacks — they are overridden by:
#   1. roster.conf header (SUBNET=, WG_PORT=, LDOWN_PORT=)
#   2. environment variables set before invoking ldown
#   3. flags passed to individual commands
#
# do not edit this file for per-deployment configuration
# put your settings in /etc/ldown/roster.conf instead
# =============================================================================

# =============================================================================
# network ports
# =============================================================================

# WireGuard listen port — used on all nodes unless --port overrides per-node
WG_PORT="${WG_PORT:-51820}"

# ldown control plane port — listener runs here for /health /join /sync etc.
LDOWN_PORT="${LDOWN_PORT:-51821}"
BOOTSTRAP_PORT="${BOOTSTRAP_PORT:-51822}"
SYNC_STALE_THRESHOLD="${SYNC_STALE_THRESHOLD:-180}"

# =============================================================================
# tunnel addressing
# =============================================================================

# default tunnel subnet (without trailing .0 — nodes get SUBNET.POSITION)
# example: SUBNET=10.10.0 → nodes get 10.10.0.1, 10.10.0.2, 10.10.0.3, ...
SUBNET="${SUBNET:-10.10.0}"

# default PersistentKeepalive for NAT-traversal nodes (seconds)
# automatically applied when a node is detected as behind NAT
# override per-node with --keepalive in roster.conf
KEEPALIVE="${KEEPALIVE:-25}"

# =============================================================================
# timing
# =============================================================================

# seconds to wait for a WireGuard handshake before declaring failure
HANDSHAKE_TIMEOUT="${HANDSHAKE_TIMEOUT:-20}"

# interval between convergence sync checks (seconds)
SYNC_INTERVAL="${SYNC_INTERVAL:-5}"

# timeout when attempting to route through a relay node (seconds)
RELAY_TIMEOUT="${RELAY_TIMEOUT:-10}"

# how many seconds since last handshake before a peer is considered stale
PEER_STALE_AFTER="${PEER_STALE_AFTER:-180}"

# how long to wait for czar health check before triggering election (seconds)
CZAR_TIMEOUT="${CZAR_TIMEOUT:-15}"

# =============================================================================
# filesystem paths — runtime state, never in repo
# =============================================================================

# base directory for all ldown runtime state
CONFIG_DIR="${CONFIG_DIR:-/etc/ldown}"

# keypair storage
KEY_DIR="${KEY_DIR:-/etc/ldown/keys}"

# WireGuard interface config directory
WG_DIR="${WG_DIR:-/etc/ldown/wg0}"

# peer config directory (one file per peer)
PEER_DIR="${PEER_DIR:-/etc/ldown/wg0/peers}"

# log directory
LOG_DIR="${LOG_DIR:-/var/log/ldown}"

# roster lock file — flock acquires this before any roster mutation
LOCK_FILE="${LOCK_FILE:-/var/lock/ldown-roster.lock}"

# =============================================================================
# log files
# =============================================================================

LOG_MAIN="${LOG_DIR}/ldown.log"
LOG_LISTENER="${LOG_DIR}/listener.log"
LOG_SYNC="${LOG_DIR}/sync.log"
LOG_SECURITY="${LOG_DIR}/security.log"

# =============================================================================
# runtime config files — auto-generated during mesh init
# =============================================================================

MESH_CONF="${CONFIG_DIR}/mesh.conf"
ROSTER_CONF="${CONFIG_DIR}/roster.conf"
ROSTER_SIG="${CONFIG_DIR}/roster.sig"
CZAR_CONF="${CONFIG_DIR}/czar.conf"
CLUSTER_PUB="${CONFIG_DIR}/cluster.pub"
NEIGHBORS_FILE="${CONFIG_DIR}/neighbors"
TLS_CERT="${CONFIG_DIR}/tls.cert"
TLS_KEY="${CONFIG_DIR}/tls.key"

# =============================================================================
# security
# =============================================================================

# TLS certificate validity period (days)
TLS_CERT_DAYS="${TLS_CERT_DAYS:-3650}"

# token is stored as sha256 hash — never store the plaintext
TOKEN_HASH_FILE="${CONFIG_DIR}/token.hash"

# maximum join requests per minute per IP before rate limiting kicks in
RATE_LIMIT_RPM="${RATE_LIMIT_RPM:-10}"

# =============================================================================
# WireGuard interface name
# =============================================================================

WG_INTERFACE="${WG_INTERFACE:-wg0}"

LDOWN_VERSION="0.2.0-alpha"
LDOWN_YES="${LDOWN_YES:-false}"

# =============================================================================
# end defaults.conf
# =============================================================================